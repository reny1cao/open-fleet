<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f0883e;
    --cyan: #39d2c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 span { color: var(--text-muted); font-weight: 400; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .refresh-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
  }

  .stat { color: var(--text-muted); }
  .stat b { color: var(--text); font-weight: 600; }

  /* Project tabs */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 12px 24px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tab {
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count {
    background: var(--border);
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 4px;
  }

  /* Layout */
  .main {
    display: flex;
    height: calc(100vh - 97px);
  }

  /* Board */
  .board {
    flex: 1;
    display: flex;
    gap: 1px;
    background: var(--border);
    overflow-x: auto;
    min-width: 0;
  }

  .column {
    flex: 1;
    min-width: 220px;
    max-width: 320px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  .column-header {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
  }

  .column-header .badge {
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
  }

  .col-open .badge { background: #1f2937; color: var(--text-muted); }
  .col-in_progress .badge { background: #0c2d6b; color: var(--accent); }
  .col-review .badge { background: #2a1a4e; color: var(--purple); }
  .col-verify .badge { background: #1a2e1a; color: var(--cyan); }
  .col-done .badge { background: #1a2e1a; color: var(--green); }
  .col-blocked .badge { background: #3b1a1a; color: var(--red); }

  .column-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .card:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }

  .card-id {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    margin: 4px 0;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    font-size: 11px;
  }

  .card-assignee {
    color: var(--accent);
    font-weight: 500;
  }

  .card-project {
    color: var(--text-muted);
    background: var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
  }

  .priority-urgent { border-left: 3px solid var(--red); }
  .priority-high { border-left: 3px solid var(--orange); }
  .priority-normal { border-left: 3px solid var(--border); }
  .priority-low { border-left: 3px solid var(--border); }

  /* Agent sidebar */
  .sidebar {
    width: 260px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  .agent-card {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .agent-name {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .agent-role {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .agent-status {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .agent-task-link {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }

  .agent-task-link:hover { text-decoration: underline; }

  .agent-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .agent-dot.active { background: var(--green); }
  .agent-dot.idle { background: var(--text-muted); }

  /* Task detail modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding-top: 60px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 600px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
  }

  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
  }

  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
    padding-right: 32px;
  }

  .modal-field {
    display: flex;
    gap: 12px;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  .modal-field:last-of-type { border-bottom: none; }

  .modal-label {
    color: var(--text-muted);
    min-width: 90px;
    flex-shrink: 0;
  }

  .modal-value { color: var(--text); word-break: break-word; }

  .modal-notes {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .modal-notes h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .note {
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
  }

  .note:last-child { border-bottom: none; }
  .note .note-author { color: var(--accent); font-weight: 500; }
  .note .note-time { color: var(--text-muted); }
  .note .note-text { color: var(--text); margin-top: 2px; }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .status-open { background: #1f2937; color: var(--text-muted); }
  .status-in_progress { background: #0c2d6b; color: var(--accent); }
  .status-review { background: #2a1a4e; color: var(--purple); }
  .status-verify { background: #1a2e1a; color: var(--cyan); }
  .status-done { background: #1a2e1a; color: var(--green); }
  .status-blocked { background: #3b1a1a; color: var(--red); }
  .status-cancelled { background: #1f2937; color: var(--text-muted); }

  .priority-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .priority-badge.urgent { background: #3b1a1a; color: var(--red); }
  .priority-badge.high { background: #3b2a1a; color: var(--orange); }
  .priority-badge.normal { background: #1f2937; color: var(--text-muted); }
  .priority-badge.low { background: #1f2937; color: var(--text-muted); }

  .empty-col {
    text-align: center;
    padding: 24px 12px;
    color: var(--text-muted);
    font-size: 12px;
  }

  /* Error banner */
  .error-banner {
    display: none;
    padding: 8px 24px;
    background: #3b1a1a;
    color: var(--red);
    font-size: 13px;
    text-align: center;
  }

  .error-banner.show { display: block; }

  /* Mobile toggle button for sidebar */
  .sidebar-toggle {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .sidebar-toggle:hover { color: var(--text); background: var(--surface-hover); }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .header { padding: 10px 12px; }
    .header h1 { font-size: 15px; }
    .stats { display: none; }

    .tabs { padding: 8px 12px 0; }
    .tab { padding: 6px 10px; font-size: 12px; }

    .main {
      flex-direction: column;
      height: auto;
      min-height: calc(100vh - 97px);
    }

    .board {
      flex-direction: column;
      overflow-x: visible;
      gap: 0;
    }

    .column {
      min-width: 100%;
      max-width: 100%;
    }

    .column-body {
      padding: 6px 12px;
    }

    .card { width: 100%; }

    .sidebar {
      width: 100%;
      border-left: none;
      border-top: 1px solid var(--border);
      display: none;
    }

    .sidebar.mobile-open { display: block; }

    .sidebar-toggle { display: block; }

    .modal {
      width: 95vw;
      margin: 0 auto;
      padding: 16px;
      border-radius: 8px;
    }

    .modal-overlay { padding-top: 20px; }

    .modal h2 { font-size: 15px; }
    .modal-field { flex-direction: column; gap: 2px; }
    .modal-label { min-width: auto; }
  }

  /* Collapsed columns on mobile — hide empty ones */
  @media (max-width: 768px) {
    .column.empty-column .column-body { display: none; }
    .column.empty-column .column-header { opacity: 0.5; padding: 8px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Fleet <span>Dashboard</span></h1>
  <div class="header-right">
    <div class="stats" id="stats"></div>
    <div><span class="refresh-dot"></span> Live</div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">Agents</button>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<div class="tabs" id="tabs">
  <button class="tab active" data-project="">All</button>
</div>

<div class="main">
  <div class="board" id="board"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Agents</div>
    <div id="agent-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const POLL_INTERVAL = 10000;
const COLUMNS = ['open', 'in_progress', 'review', 'verify', 'blocked', 'done'];
const COLUMN_LABELS = {
  open: 'Open',
  in_progress: 'In Progress',
  review: 'Review',
  verify: 'Verify',
  blocked: 'Blocked',
  done: 'Done'
};

let allTasks = [];
let currentProject = '';

async function apiFetch(path) {
  const res = await fetch(path, {
    headers: { 'Authorization': `Bearer ${TOKEN}` }
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function renderBoard(tasks) {
  const board = document.getElementById('board');
  const filtered = currentProject ? tasks.filter(t => t.project === currentProject) : tasks;

  const byStatus = {};
  COLUMNS.forEach(c => byStatus[c] = []);
  filtered.forEach(t => {
    if (byStatus[t.status]) byStatus[t.status].push(t);
  });

  // Sort by priority within each column
  const priorityOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
  Object.values(byStatus).forEach(arr =>
    arr.sort((a, b) => (priorityOrder[a.priority] ?? 2) - (priorityOrder[b.priority] ?? 2))
  );

  board.innerHTML = COLUMNS.map(status => {
    const items = byStatus[status];
    const cards = items.length === 0
      ? `<div class="empty-col">No tasks</div>`
      : items.map(t => `
        <div class="card priority-${t.priority}" onclick="showTask('${t.id}')">
          <div class="card-id">${escapeHtml(t.id)}</div>
          <div class="card-title">${escapeHtml(t.title)}</div>
          <div class="card-meta">
            ${t.assignee ? `<span class="card-assignee">${escapeHtml(t.assignee)}</span>` : '<span style="color:var(--text-muted)">unassigned</span>'}
            ${t.project ? `<span class="card-project">${escapeHtml(t.project)}</span>` : ''}
            ${t.priority !== 'normal' ? `<span class="priority-badge ${t.priority}">${t.priority}</span>` : ''}
          </div>
        </div>
      `).join('');

    return `
      <div class="column col-${status}${items.length === 0 ? ' empty-column' : ''}">
        <div class="column-header">
          ${COLUMN_LABELS[status]}
          <span class="badge">${items.length}</span>
        </div>
        <div class="column-body">${cards}</div>
      </div>
    `;
  }).join('');
}

function renderTabs(tasks) {
  const projects = new Set();
  tasks.forEach(t => { if (t.project) projects.add(t.project); });

  const tabs = document.getElementById('tabs');
  const allCount = currentProject ? tasks.length : tasks.length;

  let html = `<button class="tab ${currentProject === '' ? 'active' : ''}" onclick="setProject('')">All<span class="count">${tasks.length}</span></button>`;
  for (const p of [...projects].sort()) {
    const count = tasks.filter(t => t.project === p).length;
    html += `<button class="tab ${currentProject === p ? 'active' : ''}" onclick="setProject('${escapeHtml(p)}')">${escapeHtml(p)}<span class="count">${count}</span></button>`;
  }
  tabs.innerHTML = html;
}

function renderAgents(tasks) {
  // Group tasks by assignee
  const agents = {};
  tasks.forEach(t => {
    if (!t.assignee) return;
    if (!agents[t.assignee]) agents[t.assignee] = [];
    if (t.status !== 'done' && t.status !== 'cancelled') {
      agents[t.assignee].push(t);
    }
  });

  const list = document.getElementById('agent-list');
  const agentNames = Object.keys(agents).sort();

  // Also include agents with no active tasks
  tasks.forEach(t => {
    if (t.assignee && !agents[t.assignee]) agents[t.assignee] = [];
  });

  if (agentNames.length === 0) {
    list.innerHTML = '<div class="agent-card"><div class="agent-status">No agents found</div></div>';
    return;
  }

  list.innerHTML = agentNames.map(name => {
    const active = agents[name] || [];
    const isActive = active.some(t => t.status === 'in_progress' || t.status === 'review');
    return `
      <div class="agent-card">
        <div class="agent-name">
          <span class="agent-dot ${isActive ? 'active' : 'idle'}"></span>
          ${escapeHtml(name)}
        </div>
        ${active.length === 0
          ? '<div class="agent-status">Idle</div>'
          : active.map(t => `
            <div class="agent-status">
              <span class="status-badge status-${t.status}">${t.status.replace('_', ' ')}</span>
              <a class="agent-task-link" onclick="showTask('${t.id}')">${escapeHtml(t.id)}</a>
              ${escapeHtml(t.title.length > 30 ? t.title.slice(0, 30) + '...' : t.title)}
            </div>
          `).join('')
        }
      </div>
    `;
  }).join('');
}

function renderStats(tasks) {
  const active = tasks.filter(t => t.status !== 'done' && t.status !== 'cancelled');
  const done = tasks.filter(t => t.status === 'done');
  const blocked = tasks.filter(t => t.status === 'blocked');
  const inReview = tasks.filter(t => t.status === 'review' || t.status === 'verify');

  document.getElementById('stats').innerHTML = `
    <span class="stat"><b>${active.length}</b> active</span>
    <span class="stat"><b>${inReview.length}</b> in review</span>
    <span class="stat"><b>${blocked.length}</b> blocked</span>
    <span class="stat"><b>${done.length}</b> done</span>
  `;
}

async function showTask(taskId) {
  try {
    const task = await apiFetch(`/tasks/${taskId}`);
    const modal = document.getElementById('modal');

    const fields = [
      ['Status', `<span class="status-badge status-${task.status}">${task.status.replace('_', ' ')}</span>`],
      ['Priority', `<span class="priority-badge ${task.priority}">${task.priority}</span>`],
      ['Assignee', task.assignee ? escapeHtml(task.assignee) : '<span style="color:var(--text-muted)">unassigned</span>'],
      ['Project', task.project ? escapeHtml(task.project) : '<span style="color:var(--text-muted)">none</span>'],
      ['Created', `${escapeHtml(task.createdBy)} &middot; ${timeAgo(task.createdAt)}`],
    ];

    if (task.workspace) fields.push(['Workspace', escapeHtml(task.workspace)]);
    if (task.description) fields.push(['Description', escapeHtml(task.description)]);
    if (task.blockedReason) fields.push(['Blocked', `<span style="color:var(--red)">${escapeHtml(task.blockedReason)}</span>`]);
    if (task.startedAt) fields.push(['Started', timeAgo(task.startedAt)]);
    if (task.completedAt) fields.push(['Completed', timeAgo(task.completedAt)]);
    if (task.dependsOn?.length) fields.push(['Depends on', task.dependsOn.map(d => `<a class="agent-task-link" onclick="showTask('${d}')">${escapeHtml(d)}</a>`).join(', ')]);

    if (task.result) {
      if (task.result.summary) fields.push(['Result', escapeHtml(task.result.summary)]);
      if (task.result.prUrl) fields.push(['PR', `<a href="${escapeHtml(task.result.prUrl)}" target="_blank" style="color:var(--accent)">${escapeHtml(task.result.prUrl)}</a>`]);
      if (task.result.filesChanged?.length) fields.push(['Files', task.result.filesChanged.map(f => escapeHtml(f)).join(', ')]);
    }

    const notesHtml = task.notes.length > 0 ? `
      <div class="modal-notes">
        <h3>Activity (${task.notes.length})</h3>
        ${task.notes.slice().reverse().map(n => `
          <div class="note">
            <span class="note-author">${escapeHtml(n.author)}</span>
            <span class="note-time">&middot; ${timeAgo(n.timestamp)}</span>
            <div class="note-text">${escapeHtml(n.text)}</div>
          </div>
        `).join('')}
      </div>
    ` : '';

    modal.innerHTML = `
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>${escapeHtml(task.id)}: ${escapeHtml(task.title)}</h2>
      ${fields.map(([label, value]) => `
        <div class="modal-field">
          <div class="modal-label">${label}</div>
          <div class="modal-value">${value}</div>
        </div>
      `).join('')}
      ${notesHtml}
    `;

    document.getElementById('modal-overlay').classList.add('open');
  } catch (err) {
    console.error('Failed to load task:', err);
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function setProject(project) {
  currentProject = project;
  renderTabs(allTasks);
  renderBoard(allTasks);
}

async function refresh() {
  try {
    allTasks = await apiFetch('/tasks');
    renderBoard(allTasks);
    renderTabs(allTasks);
    renderAgents(allTasks);
    renderStats(allTasks);
    document.getElementById('error-banner').classList.remove('show');
  } catch (err) {
    document.getElementById('error-banner').textContent = `Connection error: ${err.message}. Retrying...`;
    document.getElementById('error-banner').classList.add('show');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// Close modal on overlay click or Escape
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Initial load + polling
refresh();
setInterval(refresh, POLL_INTERVAL);
</script>
</body>
