<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>">
<style>
  :root, [data-theme="dark"] {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f0883e;
    --cyan: #39d2c0;
  }

  [data-theme="light"] {
    --bg: #f6f8fa;
    --surface: #ffffff;
    --surface-hover: #f3f4f6;
    --border: #d1d5db;
    --text: #1f2937;
    --text-muted: #6b7280;
    --accent: #2563eb;
    --green: #16a34a;
    --yellow: #ca8a04;
    --red: #dc2626;
    --purple: #7c3aed;
    --orange: #ea580c;
    --cyan: #0891b2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 span { color: var(--text-muted); font-weight: 400; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .refresh-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .stats { display: flex; gap: 16px; font-size: 13px; }
  .stat { color: var(--text-muted); }
  .stat b { color: var(--text); font-weight: 600; }

  .icon-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; gap: 4px;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface-hover); }

  /* Toolbar: tabs + search + sort */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 49px;
    z-index: 99;
    flex-wrap: wrap;
  }

  .tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    flex: 1;
    min-width: 0;
  }

  .tab {
    padding: 6px 14px; font-size: 13px; color: var(--text-muted);
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count {
    background: var(--border); padding: 1px 6px; border-radius: 10px;
    font-size: 11px; margin-left: 4px;
  }

  .search-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 5px 10px; font-size: 12px; width: 180px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }

  .sort-select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 5px 8px; font-size: 12px; cursor: pointer;
    outline: none;
  }

  /* Layout */
  .main { display: flex; height: calc(100vh - 98px); }

  /* Board */
  .board {
    flex: 1; display: flex; gap: 1px; background: var(--border);
    overflow-x: auto; min-width: 0;
  }

  .column {
    flex: 1; min-width: 200px; max-width: 320px;
    background: var(--bg); display: flex; flex-direction: column;
  }

  .column-header {
    padding: 10px 12px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg);
  }

  .column-header .badge {
    font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 600;
  }

  .col-backlog .badge { background: #1a1a2e; color: var(--yellow); }
  .col-open .badge { background: #1f2937; color: var(--text-muted); }
  .col-in_progress .badge { background: #0c2d6b; color: var(--accent); }
  .col-review .badge { background: #2a1a4e; color: var(--purple); }
  .col-verify .badge { background: #1a2e1a; color: var(--cyan); }
  .col-done .badge { background: #1a2e1a; color: var(--green); }
  .col-blocked .badge { background: #3b1a1a; color: var(--red); }

  .column-body {
    flex: 1; overflow-y: auto; padding: 6px;
    display: flex; flex-direction: column; gap: 4px;
  }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .card:hover { border-color: var(--accent); background: var(--surface-hover); }

  .card-id { font-size: 10px; color: var(--text-muted); font-family: 'SF Mono', monospace; }
  .card-title {
    font-size: 12px; font-weight: 500; margin: 3px 0; line-height: 1.4;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .card-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 10px; flex-wrap: wrap; }
  .card-assignee { color: var(--accent); font-weight: 500; }
  .card-project { color: var(--text-muted); background: var(--border); padding: 1px 5px; border-radius: 3px; font-size: 9px; }
  .card-time { color: var(--text-muted); margin-left: auto; }

  .priority-urgent { border-left: 3px solid var(--red); }
  .priority-high { border-left: 3px solid var(--orange); }
  .priority-normal { border-left: 3px solid var(--border); }
  .priority-low { border-left: 3px solid var(--border); }

  .show-all-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
    margin: 4px auto; display: block;
  }
  .show-all-btn:hover { color: var(--text); background: var(--surface-hover); }

  /* Agent sidebar */
  .sidebar {
    width: 240px; border-left: 1px solid var(--border);
    background: var(--surface); overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 10px 14px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .agent-card { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .agent-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .agent-role { font-size: 11px; color: var(--text-muted); font-weight: 400; }
  .agent-status { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .agent-task-link { color: var(--accent); cursor: pointer; text-decoration: none; }
  .agent-task-link:hover { text-decoration: underline; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .agent-dot.active { background: var(--green); }
  .agent-dot.idle { background: var(--text-muted); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; justify-content: center; align-items: flex-start; padding-top: 60px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    width: 600px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 24px;
  }
  .modal-close {
    float: right; background: none; border: none; color: var(--text-muted);
    font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }
  .modal h2 { font-size: 18px; margin-bottom: 16px; padding-right: 32px; }
  .modal-field {
    display: flex; gap: 12px; padding: 6px 0; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .modal-field:last-of-type { border-bottom: none; }
  .modal-label { color: var(--text-muted); min-width: 90px; flex-shrink: 0; }
  .modal-value { color: var(--text); word-break: break-word; }
  .modal-notes { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
  .modal-notes h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
  .note { font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--text-muted); }
  .note:last-child { border-bottom: none; }
  .note .note-author { color: var(--accent); font-weight: 500; }
  .note .note-time { color: var(--text-muted); }
  .note .note-text { color: var(--text); margin-top: 2px; }

  .status-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
  }
  .status-backlog { background: #1a1a2e; color: var(--yellow); }
  .status-open { background: #1f2937; color: var(--text-muted); }
  .status-in_progress { background: #0c2d6b; color: var(--accent); }
  .status-review { background: #2a1a4e; color: var(--purple); }
  .status-verify { background: #1a2e1a; color: var(--cyan); }
  .status-done { background: #1a2e1a; color: var(--green); }
  .status-blocked { background: #3b1a1a; color: var(--red); }
  .status-cancelled { background: #1f2937; color: var(--text-muted); }

  .priority-badge {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .priority-badge.urgent { background: #3b1a1a; color: var(--red); }
  .priority-badge.high { background: #3b2a1a; color: var(--orange); }
  .priority-badge.normal { background: #1f2937; color: var(--text-muted); }
  .priority-badge.low { background: #1f2937; color: var(--text-muted); }

  .empty-col { text-align: center; padding: 24px 12px; color: var(--text-muted); font-size: 12px; }

  .error-banner {
    display: none; padding: 8px 24px; background: #3b1a1a;
    color: var(--red); font-size: 13px; text-align: center;
  }
  .error-banner.show { display: block; }

  /* Mobile */
  @media (max-width: 768px) {
    .header { padding: 8px 12px; }
    .header h1 { font-size: 15px; }
    .stats { display: none; }
    .toolbar { padding: 6px 12px; top: 41px; }
    .search-box { width: 120px; }
    .main { flex-direction: column; height: auto; min-height: calc(100vh - 90px); }
    .board { flex-direction: column; overflow-x: visible; gap: 0; }
    .column { min-width: 100%; max-width: 100%; }
    .column-body { padding: 6px 12px; }
    .card { width: 100%; }
    .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); display: none; }
    .sidebar.mobile-open { display: block; }
    .sidebar-toggle { display: block !important; }
    .modal { width: 95vw; padding: 16px; border-radius: 8px; }
    .modal-overlay { padding-top: 20px; }
    .modal h2 { font-size: 15px; }
    .modal-field { flex-direction: column; gap: 2px; }
    .modal-label { min-width: auto; }
    .column.empty-column .column-body { display: none; }
    .column.empty-column .column-header { opacity: 0.5; padding: 8px 16px; }
  }

  .sidebar-toggle { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>&#9889; Fleet <span>Dashboard</span></h1>
  <div class="header-right">
    <div class="stats" id="stats"></div>
    <div><span class="refresh-dot"></span> Live</div>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">&#9790;</button>
    <button class="icon-btn sidebar-toggle" onclick="toggleSidebar()">Agents</button>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<div class="toolbar">
  <div class="tabs" id="tabs">
    <button class="tab active" data-project="">All</button>
  </div>
  <input class="search-box" id="search" type="text" placeholder="Search tasks..." oninput="applyFilters()">
  <select class="sort-select" id="sort" onchange="applyFilters()">
    <option value="priority">Priority</option>
    <option value="created">Newest</option>
    <option value="updated">Updated</option>
    <option value="title">Title</option>
  </select>
</div>

<div class="main">
  <div class="board" id="board"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Agents</div>
    <div id="agent-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const POLL_INTERVAL = 10000;
const COLUMNS = ['backlog', 'open', 'in_progress', 'review', 'verify', 'blocked', 'done'];
const COLUMN_LABELS = {
  backlog: 'Backlog', open: 'Open', in_progress: 'In Progress',
  review: 'Review', verify: 'Verify', blocked: 'Blocked', done: 'Done'
};
const DONE_LIMIT = 10;

let allTasks = [];
let currentProject = '';
let showAllDone = false;
let sortBy = 'priority';
let searchQuery = '';

async function apiFetch(path) {
  const res = await fetch(path, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  return `${Math.floor(hrs / 24)}d`;
}

function applyFilters() {
  searchQuery = document.getElementById('search').value.toLowerCase();
  sortBy = document.getElementById('sort').value;
  renderBoard(allTasks);
  updateTabTitle();
}

function sortTasks(arr) {
  const priorityOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
  if (sortBy === 'priority') return arr.sort((a, b) => (priorityOrder[a.priority] ?? 2) - (priorityOrder[b.priority] ?? 2));
  if (sortBy === 'created') return arr.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  if (sortBy === 'updated') return arr.sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));
  if (sortBy === 'title') return arr.sort((a, b) => a.title.localeCompare(b.title));
  return arr;
}

function filterTasks(tasks) {
  let filtered = currentProject ? tasks.filter(t => t.project === currentProject) : tasks;
  if (searchQuery) {
    filtered = filtered.filter(t =>
      t.id.toLowerCase().includes(searchQuery) ||
      t.title.toLowerCase().includes(searchQuery) ||
      (t.assignee || '').toLowerCase().includes(searchQuery)
    );
  }
  return filtered;
}

function renderCard(t) {
  return `
    <div class="card priority-${t.priority}" onclick="showTask('${t.id}')">
      <div class="card-id">${escapeHtml(t.id)}</div>
      <div class="card-title">${escapeHtml(t.title)}</div>
      <div class="card-meta">
        ${t.assignee ? `<span class="card-assignee">${escapeHtml(t.assignee)}</span>` : '<span style="color:var(--text-muted)">—</span>'}
        ${!currentProject && t.project ? `<span class="card-project">${escapeHtml(t.project)}</span>` : ''}
        ${t.priority !== 'normal' ? `<span class="priority-badge ${t.priority}">${t.priority}</span>` : ''}
        <span class="card-time" data-ts="${t.updatedAt || t.createdAt}">${timeAgo(t.updatedAt || t.createdAt)}</span>
      </div>
    </div>`;
}

function renderBoard(tasks) {
  const board = document.getElementById('board');
  const filtered = filterTasks(tasks);

  const byStatus = {};
  COLUMNS.forEach(c => byStatus[c] = []);
  filtered.forEach(t => {
    const col = byStatus[t.status] !== undefined ? t.status : 'open';
    byStatus[col].push(t);
  });

  Object.values(byStatus).forEach(arr => sortTasks(arr));

  board.innerHTML = COLUMNS.map(status => {
    let items = byStatus[status];
    let showAllBtn = '';

    if (status === 'done' && items.length > DONE_LIMIT && !showAllDone) {
      showAllBtn = `<button class="show-all-btn" onclick="showAllDone=true;renderBoard(allTasks)">Show all ${items.length} done</button>`;
      items = items.slice(0, DONE_LIMIT);
    } else if (status === 'done' && showAllDone && byStatus[status].length > DONE_LIMIT) {
      showAllBtn = `<button class="show-all-btn" onclick="showAllDone=false;renderBoard(allTasks)">Show last ${DONE_LIMIT}</button>`;
    }

    const cards = items.length === 0
      ? `<div class="empty-col">No tasks</div>`
      : items.map(renderCard).join('');

    return `
      <div class="column col-${status}${items.length === 0 && !showAllBtn ? ' empty-column' : ''}">
        <div class="column-header">
          ${COLUMN_LABELS[status]}
          <span class="badge">${byStatus[status].length}</span>
        </div>
        <div class="column-body">${cards}${showAllBtn}</div>
      </div>`;
  }).join('');
}

function renderTabs(tasks) {
  const projects = new Set();
  tasks.forEach(t => { if (t.project) projects.add(t.project); });
  const tabs = document.getElementById('tabs');
  const activeCount = tasks.filter(t => t.status !== 'done' && t.status !== 'cancelled').length;

  let html = `<button class="tab ${currentProject === '' ? 'active' : ''}" onclick="setProject('')">All<span class="count">${activeCount}</span></button>`;
  for (const p of [...projects].sort()) {
    const count = tasks.filter(t => t.project === p && t.status !== 'done' && t.status !== 'cancelled').length;
    html += `<button class="tab ${currentProject === p ? 'active' : ''}" onclick="setProject('${escapeHtml(p)}')">${escapeHtml(p)}<span class="count">${count}</span></button>`;
  }
  tabs.innerHTML = html;
}

async function renderAgents() {
  const list = document.getElementById('agent-list');
  try {
    const data = await apiFetch('/agents');
    const agents = data.agents || data || [];

    if (agents.length === 0) {
      list.innerHTML = '<div class="agent-card"><div class="agent-status">No agents found</div></div>';
      return;
    }

    const statusColors = { alive: 'var(--green)', stale: 'var(--yellow)', dead: 'var(--red)', off: 'var(--text-muted)', unknown: 'var(--text-muted)' };

    list.innerHTML = agents.map(a => {
      const dotColor = statusColors[a.status] || statusColors.unknown;
      const hb = a.heartbeat;
      const age = hb?.ageSec != null ? (hb.ageSec < 60 ? `${hb.ageSec}s ago` : `${Math.floor(hb.ageSec / 60)}m ago`) : '';
      const failures = a.watchdog?.consecutiveFailures || 0;
      const tasks = a.activeTasks || [];

      return `
        <div class="agent-card">
          <div class="agent-name">
            <span class="agent-dot" style="background:${dotColor}"></span>
            ${escapeHtml(a.name)}
            <span class="agent-role">${escapeHtml(a.role || '')}</span>
          </div>
          <div class="agent-status">
            ${a.status}${age ? ` &middot; ${age}` : ''}${failures > 0 ? ` &middot; <span style="color:var(--red)">${failures} failures</span>` : ''}
          </div>
          ${tasks.length === 0
            ? ''
            : tasks.map(t => `
              <div class="agent-status">
                <span class="status-badge status-${t.status}">${t.status.replace('_', ' ')}</span>
                <a class="agent-task-link" onclick="showTask('${t.id}')">${escapeHtml(t.id)}</a>
              </div>
            `).join('')}
        </div>`;
    }).join('');
  } catch {
    // Fallback: infer agents from tasks
    const agents = {};
    allTasks.forEach(t => {
      if (!t.assignee) return;
      if (!agents[t.assignee]) agents[t.assignee] = [];
      if (t.status !== 'done' && t.status !== 'cancelled') agents[t.assignee].push(t);
    });
    const names = Object.keys(agents).sort();
    if (names.length === 0) {
      list.innerHTML = '<div class="agent-card"><div class="agent-status">No agents found</div></div>';
      return;
    }
    list.innerHTML = names.map(name => {
      const active = agents[name];
      const isActive = active.some(t => t.status === 'in_progress');
      return `
        <div class="agent-card">
          <div class="agent-name"><span class="agent-dot ${isActive ? 'active' : 'idle'}"></span>${escapeHtml(name)}</div>
          ${active.length === 0 ? '<div class="agent-status">Idle</div>' : active.map(t => `<div class="agent-status"><span class="status-badge status-${t.status}">${t.status.replace('_',' ')}</span> <a class="agent-task-link" onclick="showTask('${t.id}')">${escapeHtml(t.id)}</a></div>`).join('')}
        </div>`;
    }).join('');
  }
}

function renderStats(tasks) {
  const active = tasks.filter(t => t.status !== 'done' && t.status !== 'cancelled');
  const done = tasks.filter(t => t.status === 'done');
  const blocked = tasks.filter(t => t.status === 'blocked');
  const inProgress = tasks.filter(t => t.status === 'in_progress');

  document.getElementById('stats').innerHTML = `
    <span class="stat"><b>${inProgress.length}</b> active</span>
    <span class="stat"><b>${blocked.length}</b> blocked</span>
    <span class="stat"><b>${done.length}</b> done</span>
    <span class="stat"><b>${active.length}</b> total</span>
  `;
}

function updateTabTitle() {
  const active = allTasks.filter(t => t.status !== 'done' && t.status !== 'cancelled');
  const blocked = allTasks.filter(t => t.status === 'blocked');
  const prefix = blocked.length > 0 ? `(${blocked.length}!) ` : active.length > 0 ? `(${active.length}) ` : '';
  document.title = `${prefix}Fleet Dashboard`;
}

function updateTimestamps() {
  document.querySelectorAll('.card-time[data-ts]').forEach(el => {
    el.textContent = timeAgo(el.dataset.ts);
  });
}

async function showTask(taskId) {
  try {
    const task = await apiFetch(`/tasks/${taskId}`);
    const modal = document.getElementById('modal');

    const fields = [
      ['Status', `<span class="status-badge status-${task.status}">${task.status.replace('_', ' ')}</span>`],
      ['Priority', `<span class="priority-badge ${task.priority}">${task.priority}</span>`],
      ['Assignee', task.assignee ? escapeHtml(task.assignee) : '<span style="color:var(--text-muted)">unassigned</span>'],
      ['Project', task.project ? escapeHtml(task.project) : '<span style="color:var(--text-muted)">none</span>'],
      ['Created', `${escapeHtml(task.createdBy || '?')} &middot; ${timeAgo(task.createdAt)}`],
    ];

    if (task.workspace) fields.push(['Workspace', escapeHtml(task.workspace)]);
    if (task.description) fields.push(['Description', escapeHtml(task.description)]);
    if (task.blockedReason) fields.push(['Blocked', `<span style="color:var(--red)">${escapeHtml(task.blockedReason)}</span>`]);
    if (task.startedAt) fields.push(['Started', timeAgo(task.startedAt)]);
    if (task.completedAt) fields.push(['Completed', timeAgo(task.completedAt)]);
    if (task.dependsOn?.length) fields.push(['Depends on', task.dependsOn.map(d => `<a class="agent-task-link" onclick="showTask('${d}')">${escapeHtml(d)}</a>`).join(', ')]);

    if (task.result) {
      if (task.result.summary) fields.push(['Result', escapeHtml(task.result.summary)]);
      if (task.result.prUrl) fields.push(['PR', `<a href="${escapeHtml(task.result.prUrl)}" target="_blank" style="color:var(--accent)">${escapeHtml(task.result.prUrl)}</a>`]);
      if (task.result.filesChanged?.length) fields.push(['Files', task.result.filesChanged.map(f => escapeHtml(f)).join(', ')]);
    }

    const notesHtml = task.notes?.length > 0 ? `
      <div class="modal-notes">
        <h3>Activity (${task.notes.length})</h3>
        ${task.notes.slice().reverse().map(n => `
          <div class="note">
            <span class="note-author">${escapeHtml(n.author)}</span>
            <span class="note-time">&middot; ${timeAgo(n.timestamp)}</span>
            <div class="note-text">${escapeHtml(n.text)}</div>
          </div>
        `).join('')}
      </div>` : '';

    modal.innerHTML = `
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>${escapeHtml(task.id)}: ${escapeHtml(task.title)}</h2>
      ${fields.map(([l, v]) => `<div class="modal-field"><div class="modal-label">${l}</div><div class="modal-value">${v}</div></div>`).join('')}
      ${notesHtml}`;

    document.getElementById('modal-overlay').classList.add('open');
  } catch (err) { console.error('Failed to load task:', err); }
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function setProject(project) {
  currentProject = project;
  showAllDone = false;
  renderTabs(allTasks);
  renderBoard(allTasks);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mobile-open'); }

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('fleet-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '\u263E' : '\u2600';
}

// Restore theme
const saved = localStorage.getItem('fleet-theme');
if (saved) {
  document.documentElement.dataset.theme = saved;
  document.getElementById('theme-btn').textContent = saved === 'dark' ? '\u263E' : '\u2600';
}

async function refresh() {
  try {
    allTasks = await apiFetch('/tasks');
    renderBoard(allTasks);
    renderTabs(allTasks);
    renderAgents();
    renderStats(allTasks);
    updateTabTitle();
    document.getElementById('error-banner').classList.remove('show');
  } catch (err) {
    document.getElementById('error-banner').textContent = `Connection error: ${err.message}. Retrying...`;
    document.getElementById('error-banner').classList.add('show');
  }
}

// Close modal on overlay click or Escape
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// Initial load + polling + timestamp refresh
refresh();
setInterval(refresh, POLL_INTERVAL);
setInterval(updateTimestamps, 30000);
</script>
</body>
</html>
